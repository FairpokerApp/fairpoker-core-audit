name: CodeQL Security Scanning

# Free GitHub-native code scanning for the Fair Poker core audit package.
# Runs on every push / PR to main and weekly, and reports findings under the
# repository "Security" tab. JavaScript/TypeScript is analysed directly from
# source, so no build step (and no build secrets) are required.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '23 3 * * 1'

jobs:
  analyze:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
