name: CodeQL Security Scanning

# Free GitHub-native code scanning for the Fair Poker core audit package.
# Runs on every push / PR to main and weekly, and reports findings under the
# repository "Security" tab. JavaScript/TypeScript is analysed directly from
# source, so no build step (and no build secrets) are required.
#
# Scope: the shipped browser client code under src/ — the fairness, crypto,
# transport and UI that actually runs in a player's browser. Local-only build
# and release tooling (scripts/) is excluded: it runs on the maintainer's own
# machine over trusted input and is not a player-reachable attack surface.
# Queries are limited to the security suite (not security-and-quality) so the
# results are vulnerabilities, not style/quality lint.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '23 3 * * 1'

jobs:
  analyze:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
          config: |
            paths:
              - src
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
